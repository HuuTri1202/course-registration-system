<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản — QLDKMH</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">📝</div>
      <h1 class="auth-title">Đăng ký tài khoản</h1>
      <p class="auth-subtitle">Hệ thống Quản lý Đăng ký Môn học</p>

      <div id="auth-error"   class="auth-alert"   style="display:none"></div>
      <div id="auth-success" class="auth-success"  style="display:none"></div>

      <form id="register-form">
        <!-- Chọn loại tài khoản -->
        <div class="form-group">
          <label>Loại tài khoản</label>
          <select id="role">
            <option value="student">🎓 Sinh viên</option>
            <option value="admin">👑 Admin</option>
          </select>
        </div>

        <!-- Dành cho sinh viên -->
        <div class="form-group" id="student-id-group">
          <label for="studentId">Mã sinh viên <span class="required">*</span></label>
          <input type="text" id="studentId" placeholder="Ví dụ: SV001" autocomplete="off">
          <small>Mã sinh viên phải đã được Admin thêm vào hệ thống</small>
        </div>

        <!-- Dành cho admin -->
        <div class="form-group" id="admin-secret-group" style="display:none">
          <label for="adminSecret">Mã bí mật Admin <span class="required">*</span></label>
          <input type="password" id="adminSecret" placeholder="Nhập mã bí mật Admin" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="reg-username">Tên đăng nhập <span class="required">*</span></label>
          <input type="text" id="reg-username" placeholder="Tối thiểu 3 ký tự" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="reg-password">Mật khẩu <span class="required">*</span></label>
          <div class="password-wrap">
            <input type="password" id="reg-password" placeholder="Tối thiểu 6 ký tự" required autocomplete="new-password">
            <button type="button" class="btn-eye" onclick="togglePw('reg-password', this)">👁</button>
          </div>
        </div>

        <button type="submit" id="btn-register" class="btn-auth">Đăng ký</button>
      </form>

      <p class="auth-link">Đã có tài khoản? <a href="/login.html">Đăng nhập</a></p>
    </div>
  </div>
  <script src="/js/register-account.js"></script>
</body>
</html>
