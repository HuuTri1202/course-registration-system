<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sửa môn học</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">
  <h2>✏️ Sửa môn học</h2>

  <form id="form" class="form-card">

    <label>Mã môn học</label>
    <input id="code" disabled>

    <label>Tên môn</label>
    <input id="name" required>

    <label>Giảng viên</label>
    <input id="teacher" required>

    <label>Loại môn</label>
    <select id="type">
      <option value="Lý thuyết">Lý thuyết</option>
      <option value="Thực hành">Thực hành</option>
      <option value="Lý thuyết + Thực hành">Lý thuyết + Thực hành</option>
    </select>

    <label>Sĩ số tối đa</label>
    <input type="number" id="capacity" min="1" required>

    <label>Trạng thái</label>
    <select id="status">
      <option value="Mở">Mở</option>
      <option value="Đóng">Đóng</option>
      <option value="Hủy">Hủy</option>
    </select>

    <h3>📅 Lịch học</h3>
    <div id="schedule-container"></div>

    <button type="button" id="addSchedule">➕ Thêm lịch</button>

    <br><br>
    <button type="submit">Cập nhật</button>

  </form>
</div>

<script src="../js/edit-course.js" defer></script>
</body>
</html>
